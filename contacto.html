<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Contacto | TechStore Wade</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="estilo.css">

</head>

<body>

    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="index.html">TechStore Wade</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="ofertas.html">Ofertas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
                    <li class="nav-item"><a class="nav-link" href="nosotros.html">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Formulario -->
    <main class="container mt-5">

        <h1 class="text-center">Contacto</h1>

        <form onsubmit="return validarFormulario()">

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre">
            </div>

            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" class="form-control" id="correo">
            </div>

            <div class="mb-3">
                <label class="form-label">Mensaje</label>
                <textarea class="form-control" id="mensaje" rows="4"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                Enviar
            </button>

        </form>

    </main>

    <!-- Pie de página -->
    <footer class="bg-dark text-white text-center p-3 mt-5">

        <p>&copy; 2026 TechStore Wade</p>

    </footer>
